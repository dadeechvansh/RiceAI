<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}RiceAI — AI Powered Rice Variety Classification{% endblock %}</title>
<meta name="description" content="RiceAI classifies Cammeo and Osmancik rice grain varieties using a Random Forest model trained on 3,810 samples with 91.99% accuracy.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌾</text></svg>">
<link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
{% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

<div class="noise-overlay" aria-hidden="true"></div>
<div class="grid-backdrop" aria-hidden="true"></div>

<header class="site-header" id="siteHeader">
  <nav class="navbar">
    <a href="/" class="brand">
      <span class="brand-mark">
        <svg viewBox="0 0 32 32" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 2C16 2 6 10.5 6 19a10 10 0 0 0 20 0C26 10.5 16 2 16 2Z" stroke="url(#gradMark)" stroke-width="2" stroke-linejoin="round"/>
          <path d="M16 8v20" stroke="url(#gradMark)" stroke-width="2" stroke-linecap="round"/>
          <defs>
            <linearGradient id="gradMark" x1="6" y1="2" x2="26" y2="30" gradientUnits="userSpaceOnUse">
              <stop stop-color="#22C55E"/>
              <stop offset="1" stop-color="#3B82F6"/>
            </linearGradient>
          </defs>
        </svg>
      </span>
      <span class="brand-name">Rice<span class="brand-accent">AI</span></span>
    </a>

    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <div class="nav-links" id="navLinks">
      <a href="/" class="nav-link {% block nav_home %}{% endblock %}">Home</a>
      <a href="/predict" class="nav-link {% block nav_predict %}{% endblock %}">Predict</a>
      <a href="https://github.com/dadeechvansh" target="_blank" rel="noopener" class="nav-link nav-link--external">
        GitHub
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 17 17 7M7 7h10v10"/></svg>
      </a>
      <a href="/predict" class="btn btn--sm btn--primary nav-cta">Try Prediction</a>
    </div>
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <div class="brand">
        <span class="brand-mark">
          <svg viewBox="0 0 32 32" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 2C16 2 6 10.5 6 19a10 10 0 0 0 20 0C26 10.5 16 2 16 2Z" stroke="url(#gradMark2)" stroke-width="2" stroke-linejoin="round"/>
            <path d="M16 8v20" stroke="url(#gradMark2)" stroke-width="2" stroke-linecap="round"/>
            <defs>
              <linearGradient id="gradMark2" x1="6" y1="2" x2="26" y2="30" gradientUnits="userSpaceOnUse">
                <stop stop-color="#22C55E"/>
                <stop offset="1" stop-color="#3B82F6"/>
              </linearGradient>
            </defs>
          </svg>
        </span>
        <span class="brand-name">Rice<span class="brand-accent">AI</span></span>
      </div>
      <p class="footer-tagline">Grain-level classification, powered by a tuned Random Forest ensemble.</p>
    </div>

    <div class="footer-links">
      <a href="https://github.com/dadeechvansh" target="_blank" rel="noopener" aria-label="GitHub">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.09 3.29 9.4 7.86 10.93.57.1.78-.25.78-.55v-2.15c-3.2.7-3.87-1.42-3.87-1.42-.53-1.34-1.28-1.7-1.28-1.7-1.05-.71.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.19-3.09-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11.1 11.1 0 0 1 5.79 0c2.2-1.49 3.17-1.18 3.17-1.18.64 1.59.24 2.76.12 3.05.74.8 1.19 1.83 1.19 3.09 0 4.42-2.7 5.4-5.26 5.68.42.36.78 1.07.78 2.16v3.2c0 .3.2.66.79.55A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"/></svg>
      </a>

      </a>
      <a href="https://instagram.com/havoc.wav" target="_blank" rel="noopener" aria-label="Instagram">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7.75 2C4.57 2 2 4.57 2 7.75v8.5C2 19.43 4.57 22 7.75 22h8.5C19.43 22 22 19.43 22 16.25v-8.5C22 4.57 19.43 2 16.25 2h-8.5Zm0 2h8.5A3.75 3.75 0 0 1 20 7.75v8.5A3.75 3.75 0 0 1 16.25 20h-8.5A3.75 3.75 0 0 1 4 16.25v-8.5A3.75 3.75 0 0 1 7.75 4Zm9.5 1a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5ZM12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10Zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6Z"/></svg>

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7 10-7"/></svg>
      </a>
    </div>

    <div class="footer-meta">
      <span class="version-badge">v2.0</span>
      <span class="footer-copy">© <span id="footerYear"></span> RiceAI. Built for research &amp; portfolio purposes.</span>
    </div>
  </div>
</footer>

<script src="{{ url_for('static', path='js/script.js') }}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
